<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catatan Keuangan KKN</title>

    <link rel="icon" type="image/png" href="assets/images/icon-192.png">
    <link rel="apple-touch-icon" href="assets/images/icon-192.png">
    
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="js/tailwind-config.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-sagebg text-sagedark font-sans min-h-screen flex flex-col relative overflow-x-hidden p-4 md:p-6">

    <nav class="w-full max-w-5xl mx-auto mb-8 flex justify-between items-center flex-wrap gap-4 z-10 pt-2">
        <a href="index.html" class="text-sagedark font-bold bg-white/80 backdrop-blur-md px-5 py-2.5 rounded-full hover:bg-white transition-all shadow-sm border border-white/50 flex items-center gap-2">
            &larr; Kembali
        </a>
        <button onclick="downloadCSV('cashflow')" class="bg-white/80 backdrop-blur-md text-sagedark font-bold px-5 py-2.5 rounded-full hover:bg-white transition-all shadow-sm border border-white/50">
            📥 Download Rekap CSV
        </button>
    </nav>

    <main class="flex-grow w-full max-w-5xl mx-auto z-10 flex flex-col">
        
        <div class="mb-8 text-center md:text-left text-white drop-shadow-md">
            <h1 class="text-3xl md:text-4xl font-mono font-bold mb-2">Catatan Keuangan</h1>
            <p class="text-sm opacity-95 font-bold">Pantau dan catat setiap transaksi arus kas kelompok KKN.</p>
        </div>

        <div class="flex flex-col md:flex-row gap-8 flex-grow">
            <!-- KOLOM KIRI: Form Transaksi (Diberi ID untuk Satpam Virtual) -->
            <div id="formKolom" class="bg-white/40 backdrop-blur-lg border border-white/60 p-8 rounded-[2.5rem] shadow-[0_8px_32px_0_rgba(31,38,135,0.15)] w-full md:w-1/2 h-fit transition-all duration-500">
                <div class="mb-6">
                    <h2 class="text-xl font-mono font-bold mb-1 text-sagedark">Catat Transaksi</h2>
                    <p class="text-xs text-sagedark/80 font-medium">Masukkan detail pengeluaran atau pemasukan baru.</p>
                </div>

                <form id="formCashflow" class="space-y-5">
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-sagedark/80 mb-2 pl-2">Jenis Transaksi</label>
                        <div class="grid grid-cols-2 gap-3">
                            <label class="flex items-center justify-center space-x-2 bg-white/60 backdrop-blur-sm border border-white/50 p-3 rounded-xl cursor-pointer hover:bg-white/80 transition has-[:checked]:border-salmon has-[:checked]:bg-white/90 shadow-sm">
                                <input type="radio" name="tipe" value="Pemasukan" class="text-salmon focus:ring-salmon" required>
                                <span class="font-bold text-sm text-sagedark">Pemasukan</span>
                            </label>
                            <label class="flex items-center justify-center space-x-2 bg-white/60 backdrop-blur-sm border border-white/50 p-3 rounded-xl cursor-pointer hover:bg-white/80 transition has-[:checked]:border-salmon has-[:checked]:bg-white/90 shadow-sm">
                                <input type="radio" name="tipe" value="Pengeluaran" class="text-salmon focus:ring-salmon">
                                <span class="font-bold text-sm text-sagedark">Pengeluaran</span>
                            </label>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-sagedark/80 mb-2 pl-2">Nominal (Rp)</label>
                        <input type="number" id="nominal" placeholder="Contoh: 50000" class="w-full bg-white/60 backdrop-blur-sm border border-white/50 p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-white/80 text-sagedark font-semibold shadow-sm transition-all" required>
                    </div>

                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-sagedark/80 mb-2 pl-2">Penanggung Jawab (PIC)</label>
                        <input type="text" id="pic" placeholder="Contoh: Akmal (Beli Cat)" class="w-full bg-white/60 backdrop-blur-sm border border-white/50 p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-white/80 text-sagedark font-semibold shadow-sm transition-all" required>
                    </div>

                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-sagedark/80 mb-2 pl-2">Keterangan Tambahan</label>
                        <input type="text" id="keterangan" placeholder="Cat warna hijau 2 kaleng..." class="w-full bg-white/60 backdrop-blur-sm border border-white/50 p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-white/80 text-sagedark font-semibold shadow-sm transition-all" required>
                    </div>

                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-sagedark/80 mb-2 pl-2">Bukti Struk</label>
                        <input type="file" id="struk" accept="image/*" class="w-full bg-white/60 backdrop-blur-sm border border-white/50 p-2 rounded-xl text-sm file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-sagedark file:text-white hover:file:bg-black transition cursor-pointer shadow-sm text-sagedark">
                    </div>

                    <button type="submit" class="w-full bg-sagedark/90 backdrop-blur-md text-white font-bold py-3.5 rounded-xl hover:bg-sagedark transition shadow-lg mt-6 border border-sagedark">
                        Simpan Transaksi Kas 💸
                    </button>
                </form>
            </div>

            <!-- KOLOM KANAN: Total & Riwayat (Diberi ID untuk Satpam Virtual) -->
            <div id="listKolom" class="w-full md:w-1/2 flex flex-col gap-6 transition-all duration-500">
                <div class="bg-sagedark/90 backdrop-blur-md text-white p-6 rounded-[2rem] shadow-xl flex flex-col justify-center items-center h-36 border border-sagedark relative overflow-hidden">
                    <span class="font-mono text-xs uppercase tracking-widest opacity-80 mb-1">Total Saldo Kas Posko</span>
                    <span id="saldoKas" class="font-mono text-3xl md:text-4xl font-bold drop-shadow">Rp 0</span>
                </div>

                <div class="bg-white/40 backdrop-blur-lg border border-white/60 p-6 rounded-[2.5rem] shadow-[0_8px_32px_0_rgba(31,38,135,0.15)] flex-grow max-h-[500px] flex flex-col">
                    <h3 class="font-mono font-bold text-base mb-4 border-b border-sagedark/20 pb-2 text-sagedark">Riwayat Kas Terakhir</h3>
                    
                    <div id="cashflowList" class="flex flex-col gap-4 overflow-y-auto pr-2">
                        <p class="text-center text-xs text-sagedark/60 py-4 font-bold">Sedang memuat data keuangan...</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- HTML MODAL EDIT CASHFLOW -->
    <div id="modalEditCashflow" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4 opacity-0 pointer-events-none transition-all duration-300">
        <main class="w-full max-w-sm bg-white/90 backdrop-blur-xl border border-white p-8 rounded-[2.5rem] shadow-2xl relative transition-all duration-500 scale-95" id="modalCardCash">
            
            <div class="text-center mb-6">
                <div class="inline-flex items-center justify-center w-14 h-14 bg-sagedark/10 rounded-2xl mb-3 border border-sagedark/5">
                    <span class="text-2xl">✏️</span>
                </div>
                <h1 class="text-xl font-mono font-bold text-sagedark tracking-tight">Edit Transaksi</h1>
            </div>

            <form id="formEditCashflow" class="space-y-4">
                <input type="hidden" id="editCashflowId">
                
                <div class="space-y-1">
                    <label class="block text-[11px] font-bold uppercase tracking-wider text-sagedark/70 pl-2">Jenis Transaksi</label>
                    <div class="grid grid-cols-2 gap-3">
                        <label class="flex items-center justify-center space-x-1.5 bg-gray-50 border border-sagedark/10 p-2.5 rounded-xl cursor-pointer hover:bg-gray-100 transition has-[:checked]:border-salmon has-[:checked]:bg-salmon/5 shadow-inner text-sm">
                            <input type="radio" name="editTipe" id="editPemasukan" value="Pemasukan" class="text-salmon focus:ring-salmon scale-90" required>
                            <span class="font-bold text-xs text-sagedark">Pemasukan</span>
                        </label>
                        <label class="flex items-center justify-center space-x-1.5 bg-gray-50 border border-sagedark/10 p-2.5 rounded-xl cursor-pointer hover:bg-gray-100 transition has-[:checked]:border-salmon has-[:checked]:bg-salmon/5 shadow-inner text-sm">
                            <input type="radio" name="editTipe" id="editPengeluaran" value="Pengeluaran" class="text-salmon focus:ring-salmon scale-90">
                            <span class="font-bold text-xs text-sagedark">Pengeluaran</span>
                        </label>
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="block text-[11px] font-bold uppercase tracking-wider text-sagedark/70 pl-2">Nominal (Rp)</label>
                    <input type="number" id="editNominal" class="w-full bg-white border border-sagedark/10 p-3 rounded-xl focus:outline-none focus:ring-1 focus:ring-sagedark/50 text-sagedark font-semibold shadow-sm transition-all text-sm" required>
                </div>

                <div class="space-y-1">
                    <label class="block text-[11px] font-bold uppercase tracking-wider text-sagedark/70 pl-2">PIC</label>
                    <input type="text" id="editPic" class="w-full bg-white border border-sagedark/10 p-3 rounded-xl focus:outline-none focus:ring-1 focus:ring-sagedark/50 text-sagedark font-semibold shadow-sm transition-all text-sm" required>
                </div>

                <div class="space-y-1">
                    <label class="block text-[11px] font-bold uppercase tracking-wider text-sagedark/70 pl-2">Keterangan</label>
                    <input type="text" id="editKeterangan" class="w-full bg-white border border-sagedark/10 p-3 rounded-xl focus:outline-none focus:ring-1 focus:ring-sagedark/50 text-sagedark font-medium shadow-sm transition-all text-sm" required>
                </div>

                <div class="flex gap-3 pt-3">
                    <button type="button" onclick="closeModalEditCash()" class="w-1/2 bg-gray-100 text-gray-700 font-bold py-3 rounded-2xl hover:bg-gray-200 transition-all text-sm">Batal</button>
                    <button type="submit" class="w-1/2 bg-sagedark text-white font-bold py-3 rounded-2xl hover:bg-black transition-all shadow-lg text-sm">Simpan</button>
                </div>
            </form>
        </main>
    </div>

    <script>
        const apiBaseUrl = 'https://kkn-web-omega.vercel.app';

        // 🔒 SATPAM VIRTUAL: Cek Hak Akses
        const isAdmin = localStorage.getItem('kkn_vip_access') === 'true';

        // Jika bukan admin, sembunyikan form input dan perlebar list riwayat
        if (!isAdmin) {
            document.getElementById('formKolom').style.display = 'none';
            document.getElementById('listKolom').classList.remove('md:w-1/2');
            document.getElementById('listKolom').classList.add('w-full');
        }

        // Fungsi Helper Konversi File
        function convertFileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        function formatRupiah(angka) {
            return 'Rp ' + parseInt(angka).toLocaleString('id-ID');
        }

        function getTodayDateString() {
            const d = new Date();
            return d.toISOString().split('T')[0];
        }

        async function loadCashflowData() {
            const listContainer = document.getElementById('cashflowList');
            const saldoSpan = document.getElementById('saldoKas');

            try {
                const response = await fetch(`${apiBaseUrl}/cashflow/`);
                if (!response.ok) throw new Error("Gagal mengambil data");

                const data = await response.json();
                listContainer.innerHTML = '';

                if (data.length === 0) {
                    saldoSpan.innerText = "Rp 0";
                    listContainer.innerHTML = `<p class="text-center text-xs text-sagedark/60 py-4 font-bold">Belum ada transaksi dicatat.</p>`;
                    return;
                }

                let totalSaldo = 0;

                data.forEach(item => {
                    if (item.tipe === 'Pemasukan') {
                        totalSaldo += item.nominal;
                    } else if (item.tipe === 'Pengeluaran') {
                        totalSaldo -= item.nominal;
                    }

                    const isPemasukan = item.tipe === 'Pemasukan';
                    const borderClass = isPemasukan ? 'border-green-500' : 'border-salmon';
                    const textClass = isPemasukan ? 'text-green-700 font-bold' : 'text-salmon font-bold';
                    const tanda = isPemasukan ? '+' : '-';
                    const strukTag = item.struk ? `<a href="${item.struk}" target="_blank" class="text-[10px] bg-sagedark/10 px-2 py-0.5 rounded-full mt-1 inline-block hover:bg-sagedark/20">Lihat Struk</a>` : '';

                    // 🔒 Sembunyikan tombol Edit/Delete jika bukan admin
                    const actionButtons = isAdmin ? `
                        <div class="flex gap-2 border-l border-sagedark/10 pl-2">
                            <button onclick="editData(${item.id})" class="hover:scale-110 transition text-xs" title="Edit">✏️</button>
                            <button onclick="hapusData(${item.id})" class="hover:scale-110 transition text-xs" title="Hapus">🗑️</button>
                        </div>
                    ` : '';

                    const card = `
                        <div class="bg-white/70 backdrop-blur-sm border border-white/40 p-3.5 rounded-2xl shadow-sm border-l-4 ${borderClass} flex justify-between items-center transition hover:bg-white/90">
                            <div class="flex flex-col">
                                <span class="font-bold text-sm text-sagedark">${item.keterangan}</span>
                                <span class="text-[11px] text-sagedark/70 mt-0.5">${item.tanggal || ''} • <span class="font-bold text-sagedark/90">PIC: ${item.pic}</span></span>
                                ${strukTag}
                            </div>
                            <div class="flex items-center gap-3">
                                <span class="text-sm ${textClass}">${tanda}${formatRupiah(item.nominal)}</span>
                                ${actionButtons}
                            </div>
                        </div>
                    `;
                    listContainer.innerHTML += card;
                });

                saldoSpan.innerText = formatRupiah(totalSaldo);

            } catch (error) {
                listContainer.innerHTML = `<p class="text-center text-salmon text-xs py-4 font-bold">Gagal terhubung ke Backend.</p>`;
            }
        }

        document.getElementById('formCashflow').addEventListener('submit', async function(e) {
            e.preventDefault();
            const submitBtn = e.target.querySelector('button[type="submit"]');
            submitBtn.innerText = "Menyimpan...";
            submitBtn.disabled = true;

            const strukInput = document.getElementById('struk');
            let strukBase64 = null;
            if (strukInput.files.length > 0) {
                strukBase64 = await convertFileToBase64(strukInput.files[0]);
            }

            const formData = {
                tipe: document.querySelector('input[name="tipe"]:checked').value,
                nominal: parseInt(document.getElementById('nominal').value),
                pic: document.getElementById('pic').value,
                keterangan: document.getElementById('keterangan').value,
                tanggal: getTodayDateString(),
                struk: strukBase64 
            };

            try {
                const response = await fetch(`${apiBaseUrl}/cashflow/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                if (response.ok) {
                    alert("Transaksi kas berhasil dicatat!");
                    e.target.reset();
                    loadCashflowData();
                } else {
                    alert("Gagal mencatat transaksi.");
                }
            } catch (error) {
                alert("Gagal menghubungi server backend.");
            } finally {
                submitBtn.innerText = "Simpan Transaksi Kas 💸";
                submitBtn.disabled = false;
            }
        });

        async function hapusData(id) {
            if (confirm(`Yakin ingin menghapus transaksi kas ID ${id}? Tindakan ini permanen.`)) {
                try {
                    const response = await fetch(`${apiBaseUrl}/cashflow/${id}`, { method: 'DELETE' });
                    if (response.ok) {
                        alert("Transaksi berhasil dihapus.");
                        loadCashflowData(); 
                    } else {
                        alert("Gagal menghapus data dari server.");
                    }
                } catch (error) {
                    alert("Server backend ngambek. Gagal menghapus.");
                }
            }
        }

        const modal = document.getElementById('modalEditCashflow');
        const modalCard = document.getElementById('modalCardCash');

        async function editData(id) {
            try {
                modal.classList.remove('opacity-0', 'pointer-events-none');
                modalCard.classList.remove('scale-95');

                listContainer = document.getElementById('cashflowList');
                originalCard = listContainer.querySelector(`button[onclick="editData(${id})"]`).closest('.bg-white\\/70');
                
                nominalText = originalCard.querySelector('span[class*="text-sm"]').innerText;
                cleanNominal = nominalText.replace(/[^\d]/g, '');

                document.getElementById('editCashflowId').value = id;
                document.getElementById('editNominal').value = cleanNominal;
                document.getElementById('editPic').value = originalCard.querySelector('.text-sagedark\\/90').innerText.split(': ')[1];
                document.getElementById('editKeterangan').value = originalCard.querySelector('.font-bold.text-sm').innerText;

                if (originalCard.classList.contains('border-green-500')) {
                    document.getElementById('editPemasukan').checked = true;
                } else {
                    document.getElementById('editPengeluaran').checked = true;
                }

            } catch (error) {
                alert("Gagal memuat data lama untuk diedit.");
                closeModalEditCash();
            }
        }

        function closeModalEditCash() {
            modal.classList.add('opacity-0', 'pointer-events-none');
            modalCard.classList.add('scale-95');
        }

        document.getElementById('formEditCashflow').addEventListener('submit', async function(e) {
            e.preventDefault();
            const id = document.getElementById('editCashflowId').value;
            const submitBtn = e.target.querySelector('button[type="submit"]');
            submitBtn.innerText = "Menyimpan...";
            submitBtn.disabled = true;

            const formData = {
                tipe: document.querySelector('input[name="editTipe"]:checked').value,
                nominal: parseInt(document.getElementById('editNominal').value),
                pic: document.getElementById('editPic').value,
                keterangan: document.getElementById('editKeterangan').value,
                tanggal: getTodayDateString(),
                struk: null 
            };

            try {
                const response = await fetch(`${apiBaseUrl}/cashflow/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                if (response.ok) {
                    alert("Perubahan transaksi berhasil disimpan!");
                    closeModalEditCash();
                    loadCashflowData(); 
                } else {
                    alert("Gagal menyimpan perubahan.");
                }
            } catch (error) {
                alert("Gagal menghubungi server untuk mengubah data.");
            } finally {
                submitBtn.innerText = "Simpan";
                submitBtn.disabled = false;
            }
        });

        async function downloadCSV(tipe) {
            try {
                const response = await fetch(`${apiBaseUrl}/${tipe}/`);
                const data = await response.json();
                
                if(data.length === 0) {
                    return alert("Gagal download: Data kas masih kosong!");
                }

                const headers = ["No", "Tanggal", "Tipe Transaksi", "Nominal (Rp)", "PIC", "Keterangan", "Link Struk"];
                
                const rows = data.map((item, index) => {
                    const ketBersih = String(item.keterangan || "").replace(/(\r\n|\n|\r)/gm, " ").replace(/"/g, '""');
                    const linkStruk = item.struk ? item.struk : "Tidak ada struk";
                    
                    return [
                        index + 1,
                        item.tanggal,
                        item.tipe,
                        item.nominal,
                        `"${item.pic}"`,
                        `"${ketBersih}"`,
                        `"${linkStruk}"`
                    ].join(";");
                });

                const csvContent = "data:text/csv;charset=utf-8,\ufeff" + headers.join(";") + "\n" + rows.join("\n");
                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", `Rekap_CASHFLOW_KKN_${new Date().toISOString().split('T')[0]}.csv`);
                document.body.appendChild(link);
                link.click();
                link.remove();
                
            } catch (error) {
                console.error(error);
                alert("Waduh, gagal mengunduh CSV. Cek koneksi server ya.");
            }
        }

        window.addEventListener('DOMContentLoaded', loadCashflowData);
    </script>
</body>
</html>
